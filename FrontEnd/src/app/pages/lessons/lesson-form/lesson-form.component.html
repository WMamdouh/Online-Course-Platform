<div class="container section">
  <div class="form-page animate-fade-in-up">

    <div class="form-header">
      <a [routerLink]="['/courses', courseId]" class="back-link">← Back to Course</a>
      <h1>{{ isEdit ? 'Edit Lesson' : 'Add New Lesson' }}</h1>
    </div>

    <div *ngIf="errorMsg" class="alert alert-error">⚠ {{ errorMsg }}</div>

    <form [formGroup]="form" (ngSubmit)="submit()" novalidate>
      <div class="form-grid">

        <div class="form-col">
          <div class="form-group">
            <label class="form-label">Lesson Title *</label>
            <input formControlName="title" type="text" class="form-input"
                   [class.invalid]="title.touched && title.invalid"
                   placeholder="e.g. Introduction to Express.js" />
            <div class="form-error" *ngIf="title.touched && title.errors?.['required']">Title is required</div>
          </div>

          <div class="form-group">
            <label class="form-label">Content / Transcript *</label>
            <textarea formControlName="content" class="form-textarea"
                      [class.invalid]="content.touched && content.invalid"
                      placeholder="Write the lesson content, notes, or transcript…"
                      rows="10"></textarea>
            <div class="form-error" *ngIf="content.touched && content.errors?.['required']">Content is required</div>
            <div class="form-error" *ngIf="content.touched && content.errors?.['minlength']">Content must be at least 10 characters</div>
          </div>
        </div>

        <div class="form-col">
          <div class="form-group">
            <label class="form-label">Lesson Order *</label>
            <input formControlName="order" type="number" class="form-input"
                   [class.invalid]="order.touched && order.invalid"
                   min="1" placeholder="1" />
            <div class="form-error" *ngIf="order.touched && order.errors?.['required']">Order is required</div>
            <p class="form-hint">Position in the course curriculum (1 = first)</p>
          </div>

          <div class="form-group">
            <label class="form-label">Video URL</label>
            <input formControlName="videoUrl" type="url" class="form-input"
                   placeholder="https://youtube.com/watch?v=…" />
            <p class="form-hint">YouTube, Vimeo, or any direct video URL</p>
          </div>

          <div class="form-group">
            <label class="form-label">Duration (minutes)</label>
            <input formControlName="duration" type="number" class="form-input"
                   min="0" placeholder="15" />
          </div>

          <div class="form-group">
            <label class="form-label">Visibility</label>
            <div class="toggle-wrap">
              <label class="toggle-label">
                <input type="checkbox" formControlName="isPublished" class="toggle-input" />
                <span class="toggle-track"><span class="toggle-thumb"></span></span>
                <span class="toggle-text">
                  {{ form.get('isPublished')?.value ? 'Published' : 'Draft' }}
                </span>
              </label>
            </div>
          </div>
        </div>

      </div>

      <div class="form-actions">
        <a [routerLink]="['/courses', courseId]" class="btn btn-ghost btn-lg">Cancel</a>
        <button type="submit" class="btn btn-primary btn-lg" [disabled]="loading">
          {{ loading ? 'Saving…' : (isEdit ? 'Save Changes' : 'Add Lesson') }}
        </button>
      </div>
    </form>
  </div>
</div>
